name: Battle

on:
  workflow_dispatch:
    inputs:
      ref:
        description: ElysianDB git ref (branch, tag, or "latest")
        required: false
        default: main
  schedule:
    # Weekly run — Sunday 03:00 UTC.
    - cron: '0 3 * * 0'

concurrency:
  group: battle-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  battle:
    name: Run elysian-battle against ElysianDB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build elysian-battle
        run: cargo build --release

      - name: Run elysian-battle
        run: |
          ./target/release/elysian-battle \
            --version "${{ github.event.inputs.ref || 'main' }}" \
            --report json \
            --verbose

      - name: Upload battle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: battle-report
          path: .battle/reports/
          if-no-files-found: warn
